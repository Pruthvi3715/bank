version: '3.9'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=${DEMO_MODE:-false}
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-anthropic/claude-sonnet-4-6}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=graphsentinel123
      - REDIS_URL=redis://redis:6379
      - CHROMADB_URL=http://chromadb:8000
      - REDPANDA_BROKERS=redpanda:9092
      - DATABASE_URL=postgresql+asyncpg://gs_user:gs_password@postgres:5432/graphsentinel
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-graphsentinel-dev-secret-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend/demo_cache:/app/demo_cache:ro
      - ./backend/data:/app/data:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      redpanda:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - graphsentinel

  # Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - graphsentinel

  # PostgreSQL — Persistent feedback & scorer config store
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=graphsentinel
      - POSTGRES_USER=gs_user
      - POSTGRES_PASSWORD=gs_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gs_user -d graphsentinel"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - graphsentinel

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - graphsentinel

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/graphsentinel123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - graphsentinel

  # ChromaDB — Vector store for RAG knowledge base
  chromadb:
    image: ghcr.io/chroma-core/chroma:0.5.4
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma/.chroma_do_not_migrate
    restart: unless-stopped
    networks:
      - graphsentinel

  # Redpanda — Kafka-compatible streaming for real-time event pipeline
  redpanda:
    image: redpandadata/redpanda:v24.3.1
    ports:
      - "9092:9092"
      - "8081:8081"
      - "8082:8082"
    command: [
      "redpanda", "start",
      "--kafka-addr", "internal://0.0.0.0:9092,external://0.0.0.0:19092",
      "--rpc-addr", "0.0.0.0:33145",
      "--advertise-rpc-addr", "redpanda:33145",
      "--advertise-kafka-addr", "internal://redpanda:9092,external://localhost:19092",
      "--smp", "1", "--memory", "1G",
    ]
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: unless-stopped
    networks:
      - graphsentinel

  # Development service (use with: docker-compose --profile dev up)
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=false
      - ALLOWED_ORIGINS=*
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - dev
    networks:
      - graphsentinel

volumes:
  neo4j_data:
  chromadb_data:
  redpanda_data:
  postgres_data:

networks:
  graphsentinel:
    driver: bridge
